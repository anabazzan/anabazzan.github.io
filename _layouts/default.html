<!-- this below supposedly allows external links to open in a new tab -->
<script>
(function () {
  function fixLinks() {
    document.querySelectorAll('a[href]').forEach(link => {
      try {
        const url = new URL(link.href, window.location.origin);

        if (url.origin !== window.location.origin) {
          link.target = "_blank";
          link.rel = "noopener noreferrer";
        }
      } catch (e) {}
    });
  }

  // Run immediately
  fixLinks();

  // Run again after everything loads (important for Jekyll themes)
  window.addEventListener("load", fixLinks);

  // Optional: observe DOM changes (for dynamic content)
  const observer = new MutationObserver(fixLinks);
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
    
  </body>
